<!DOCTYPE html>
<html>
<head>
<title>777ZAP</title>

<style>
*{
box-sizing:border-box;
font-family:Arial;
}

body{
margin:0;
background:#e6e6e6;
}

.app{
width:390px;
max-width:95%;
margin:30px auto;
background:white;
border-radius:15px;
overflow:hidden;
box-shadow:0 5px 20px #888;
}

.top{
background:#f5c400;
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.box{
padding:15px;
}

input,button{
width:100%;
padding:12px;
margin:6px 0;
border-radius:10px;
border:1px solid #ccc;
}

button{
background:#f5c400;
border:0;
font-weight:bold;
cursor:pointer;
}

#chat{
display:none;
}

#mensagens{
height:350px;
overflow:auto;
background:#f7f7f7;
padding:10px;
}

.msg{
background:white;
margin:8px 0;
padding:10px;
border-radius:12px;
box-shadow:0 2px 5px #ddd;
}

.nome{
font-weight:bold;
color:#b08a00;
}

img{
max-width:200px;
border-radius:10px;
}
</style>

</head>

<body>


<div class="app" id="login">

<div class="top">
777ZAP
</div>

<div class="box">

<input id="usuario" placeholder="Nome">

<input id="senha" type="password" placeholder="Senha">

<button onclick="entrar()">Entrar</button>

<p id="erro"></p>

</div>

</div>




<div class="app" id="chat">

<div class="top">
Plano777
</div>


<div id="mensagens"></div>


<div class="box">

<input id="texto" placeholder="Digite uma mensagem">

<button onclick="enviar()">Enviar</button>


<input type="file" id="foto" accept="image/*">

<button onclick="enviarFoto()">Enviar foto</button>


<button onclick="baixar()">Baixar conversa</button>


<button onclick="apagar()">Apagar conversa antiga</button>

</div>

</div>



<script>


let contas={
lorenzo:"lorenzo777",
izaque:"izaque777"
};


let usuarioAtual="";



function entrar(){

let nome=document.getElementById("usuario").value.toLowerCase();

let senha=document.getElementById("senha").value.toLowerCase();


if(contas[nome]==senha){


usuarioAtual=nome;


document.getElementById("login").style.display="none";

document.getElementById("chat").style.display="block";


carregar();


}else{

erro.innerHTML="Login incorreto";

}

}




function enviar(){

let texto=document.getElementById("texto").value;


if(texto=="") return;


let lista=JSON.parse(localStorage.getItem("plano777")||"[]");


lista.push({

nome:usuarioAtual,

texto:texto,

tipo:"texto"

});


localStorage.setItem("plano777",JSON.stringify(lista));


document.getElementById("texto").value="";


carregar();

}




function enviarFoto(){

let arquivo=document.getElementById("foto").files[0];


if(!arquivo)return;


let leitor=new FileReader();


leitor.onload=function(){


let lista=JSON.parse(localStorage.getItem("plano777")||"[]");


lista.push({

nome:usuarioAtual,

texto:leitor.result,

tipo:"foto"

});


localStorage.setItem("plano777",JSON.stringify(lista));


carregar();


};


leitor.readAsDataURL(arquivo);

}




function carregar(){


let caixa=document.getElementById("mensagens");


caixa.innerHTML="";


let lista=JSON.parse(localStorage.getItem("plano777")||"[]");


lista.forEach(m=>{


if(m.tipo=="foto"){


caixa.innerHTML+=`

<div class="msg">
<div class="nome">${m.nome}</div>
<img src="${m.texto}">
</div>

`;

}else{


caixa.innerHTML+=`

<div class="msg">
<div class="nome">${m.nome}</div>
${m.texto}
</div>

`;

}


});


caixa.scrollTop=caixa.scrollHeight;


}




function baixar(){


let confirmar=confirm("Deseja baixar a conversa do Plano777?");


if(!confirmar)return;


let lista=JSON.parse(localStorage.getItem("plano777")||"[]");


let texto="Plano777 - 777ZAP\n\n";


lista.forEach(m=>{


if(m.tipo=="texto"){

texto+=m.nome+": "+m.texto+"\n";

}else{

texto+=m.nome+": [Foto]\n";

}


});


let arquivo=new Blob([texto],{type:"text/plain"});


let link=document.createElement("a");


link.href=URL.createObjectURL(arquivo);


link.download="Plano777.txt";


link.click();


}




function apagar(){


let confirmar=confirm("Apagar toda a conversa antiga?");


if(confirmar){

localStorage.removeItem("plano777");

carregar();

}


}


</script>


</body>
</html>
