<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>777ZAP</title>

<style>

body{
margin:0;
font-family:Arial;
background:#ddd;
}

.app{
width:100%;
max-width:390px;
margin:20px auto;
background:white;
border-radius:15px;
overflow:hidden;
box-shadow:0 5px 15px #777;
}

.top{
background:#f5c400;
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.box{
padding:15px;
}

input,button{
width:100%;
box-sizing:border-box;
padding:12px;
margin:5px 0;
border-radius:10px;
border:1px solid #ccc;
font-size:16px;
}

button{
background:#f5c400;
border:0;
font-weight:bold;
}

#chat{
display:none;
}

#mensagens{
height:350px;
overflow:auto;
padding:10px;
background:#f7f7f7;
}

.msg{
background:white;
padding:10px;
margin:8px;
border-radius:12px;
box-shadow:0 2px 5px #ccc;

word-wrap:break-word;
overflow-wrap:break-word;
white-space:pre-wrap;
}

.perfil{
display:flex;
align-items:center;
gap:10px;
}

.perfil img{
width:40px;
height:40px;
border-radius:50%;
object-fit:cover;
}

.nome{
font-weight:bold;
color:#b28b00;
}

.msg img{
max-width:100%;
border-radius:10px;
}

</style>

</head>


<body>


<div class="app" id="login">

<div class="top">
777ZAP
</div>


<div class="box">

<input id="usuario" placeholder="Nome">

<input id="senha" type="password" placeholder="Senha">

<button onclick="entrar()">Entrar</button>

<p id="erro"></p>

</div>

</div>





<div class="app" id="chat">


<div class="top">
Plano777
</div>


<div id="mensagens"></div>


<div class="box">

<input id="texto" placeholder="Mensagem">


<button onclick="enviar()">
Enviar
</button>


<input id="foto" type="file" accept="image/*">


<button onclick="enviarFoto()">
Enviar foto
</button>


<button onclick="abrirConfig()">
⚙️ Alterar conta
</button>


<button onclick="apagar()">
Apagar conversa inteira
</button>


<div id="config" style="display:none">

<h3>Alterar conta</h3>

<input id="novoNome" placeholder="Novo nome">

<input id="novaSenha" placeholder="Nova senha">

<input id="novaFoto" type="file" accept="image/*">

<button onclick="salvarConta()">
Salvar alterações
</button>

</div>


</div>


</div>




<script>


let contas=JSON.parse(localStorage.contas777 || "{}");


if(Object.keys(contas).length==0){

contas={

"lorenzo":{
senha:"lorenzo777",
foto:"https://cdn-icons-png.flaticon.com/512/149/149071.png"
},

"izaque":{
senha:"izaque777",
foto:"https://cdn-icons-png.flaticon.com/512/149/149071.png"
}

};

localStorage.contas777=JSON.stringify(contas);

}


let usuarioAtual="";
function entrar(){

let nome=document.getElementById("usuario").value.toLowerCase();
let senha=document.getElementById("senha").value;


let contas=JSON.parse(localStorage.contas777 || "{}");


if(contas[nome] && contas[nome].senha == senha){

usuarioAtual=nome;


document.getElementById("login").style.display="none";

document.getElementById("chat").style.display="block";


carregar();


}else{

document.getElementById("erro").innerHTML="Login errado";

}

}



function enviar(){

let texto=document.getElementById("texto").value;


if(!texto)return;


let lista=JSON.parse(localStorage.plano777 || "[]");


lista.push({

nome:usuarioAtual,

texto:texto,

tipo:"texto"

});


localStorage.plano777=JSON.stringify(lista);


document.getElementById("texto").value="";


carregar();

}




function enviarFoto(){

let arquivo=document.getElementById("foto").files[0];


if(!arquivo)return;


let leitor=new FileReader();


leitor.onload=function(){


let lista=JSON.parse(localStorage.plano777 || "[]");


lista.push({

nome:usuarioAtual,

texto:leitor.result,

tipo:"foto"

});


localStorage.plano777=JSON.stringify(lista);


carregar();


};


leitor.readAsDataURL(arquivo);


}





function carregar(){


let div=document.getElementById("mensagens");

div.innerHTML="";


let lista=JSON.parse(localStorage.plano777 || "[]");

let contas=JSON.parse(localStorage.contas777 || "{}");



lista.forEach((m,i)=>{


let apagar="";


if(m.nome==usuarioAtual){

apagar=`

<br>

<button onclick="deletar(${i})">
Deletar
</button>

`;

}



let foto=contas[m.nome]?.foto || 
"https://cdn-icons-png.flaticon.com/512/149/149071.png";



if(m.tipo=="foto"){


div.innerHTML+=`

<div class="msg">

<div class="perfil">

<img src="${foto}">

<div class="nome">${m.nome}</div>

</div>

<br>

<img src="${m.texto}">

${apagar}

</div>

`;


}else{


div.innerHTML+=`

<div class="msg">

<div class="perfil">

<img src="${foto}">

<div class="nome">${m.nome}</div>

</div>

<br>

${m.texto}

${apagar}

</div>

`;


}


});


}





function deletar(i){


let lista=JSON.parse(localStorage.plano777 || "[]");


if(lista[i].nome!=usuarioAtual){

alert("Você só pode apagar suas mensagens!");

return;

}


if(confirm("Deletar mensagem?")){


lista.splice(i,1);


localStorage.plano777=JSON.stringify(lista);


carregar();


}


}





function abrirConfig(){

document.getElementById("config").style.display="block";

}




function salvarConta(){


let novoNome=document.getElementById("novoNome").value.toLowerCase();

let novaSenha=document.getElementById("novaSenha").value;


if(!novoNome || !novaSenha){

alert("Preencha nome e senha");

return;

}


let contas=JSON.parse(localStorage.contas777 || "{}");


contas[novoNome]={

senha:novaSenha,

foto:contas[usuarioAtual].foto

};


delete contas[usuarioAtual];


usuarioAtual=novoNome;


localStorage.contas777=JSON.stringify(contas);


alert("Conta alterada!");


carregar();


}





document.getElementById("novaFoto").addEventListener("change",function(){


let arquivo=this.files[0];


if(!arquivo)return;


let leitor=new FileReader();


leitor.onload=function(){


let contas=JSON.parse(localStorage.contas777 || "{}");


contas[usuarioAtual].foto=leitor.result;


localStorage.contas777=JSON.stringify(contas);


carregar();


};


leitor.readAsDataURL(arquivo);


});






function apagar(){


if(confirm("Apagar toda conversa?")){


localStorage.removeItem("plano777");


carregar();


}


}


</script>


</body>
</html>
