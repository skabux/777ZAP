<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>777ZAP</title>

<style>

body{
margin:0;
font-family:Arial;
background:#ddd;
}

.app{
width:100%;
max-width:390px;
margin:20px auto;
background:white;
border-radius:15px;
overflow:hidden;
box-shadow:0 5px 15px #777;
box-sizing:border-box;
}

.top{
background:#f5c400;
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.box{
padding:15px;
box-sizing:border-box;
}

input,button{

width:100%;
box-sizing:border-box;
padding:12px;
margin:6px 0;
border-radius:10px;
border:1px solid #ccc;
font-size:16px;

}

button{

background:#f5c400;
border:0;
font-weight:bold;

}

#chat{
display:none;
}

#mensagens{

height:350px;
overflow:auto;
padding:10px;
background:#f7f7f7;

}

.msg{

background:white;
padding:10px;
margin:8px;
border-radius:12px;
box-shadow:0 2px 5px #ccc;
word-wrap:break-word;

}

.nome{

font-weight:bold;
color:#b28b00;

}

img{

max-width:100%;
border-radius:10px;

}

</style>

</head>


<body>


<div class="app" id="login">

<div class="top">
777ZAP
</div>


<div class="box">

<input id="usuario" placeholder="Nome">

<input id="senha" type="password" placeholder="Senha">

<button onclick="entrar()">Entrar</button>

<p id="erro"></p>

</div>

</div>




<div class="app" id="chat">


<div class="top">
Plano777
</div>


<div id="mensagens"></div>


<div class="box">


<input id="texto" placeholder="Mensagem">


<button onclick="enviar()">Enviar</button>


<input id="foto" type="file" accept="image/*">


<button onclick="enviarFoto()">
Enviar foto
</button>


<button onclick="baixar()">
Baixar conversa
</button>


<button onclick="apagar()">
Apagar conversa inteira
</button>


</div>


</div>




<script>


let contas={

"lorenzo":"lorenzo777",

"izaque":"izaque777"

};


let usuarioAtual="";




function entrar(){


let nome=document.getElementById("usuario").value.toLowerCase();

let senha=document.getElementById("senha").value.toLowerCase();



if(contas[nome]==senha){


usuarioAtual=nome;


document.getElementById("login").style.display="none";

document.getElementById("chat").style.display="block";


carregar();


}else{


document.getElementById("erro").innerHTML="Login errado";


}


}




function enviar(){


let t=document.getElementById("texto").value;


if(!t)return;



let lista=JSON.parse(localStorage.plano777||"[]");



lista.push({

nome:usuarioAtual,

texto:t,

tipo:"texto"

});



localStorage.plano777=JSON.stringify(lista);



document.getElementById("texto").value="";


carregar();


}





function enviarFoto(){


let arq=document.getElementById("foto").files[0];


if(!arq)return;



let leitor=new FileReader();



leitor.onload=function(){


let lista=JSON.parse(localStorage.plano777||"[]");



lista.push({

nome:usuarioAtual,

texto:leitor.result,

tipo:"foto"

});



localStorage.plano777=JSON.stringify(lista);



carregar();


};



leitor.readAsDataURL(arq);



}





function carregar(){


let div=document.getElementById("mensagens");


div.innerHTML="";



let lista=JSON.parse(localStorage.plano777||"[]");



lista.forEach((m,i)=>{



let apagar="";



if(m.nome==usuarioAtual){


apagar=`

<br>

<button onclick="deletar(${i})">

Deletar

</button>

`;

}



if(m.tipo=="foto"){



div.innerHTML+=`

<div class="msg">

<div class="nome">

${m.nome}

</div>


<img src="${m.texto}">


${apagar}

</div>

`;



}else{



div.innerHTML+=`

<div class="msg">

<div class="nome">

${m.nome}

</div>


${m.texto}


${apagar}

</div>

`;



}



});


}





function deletar(i){



let lista=JSON.parse(localStorage.plano777||"[]");



if(lista[i].nome!=usuarioAtual){

alert("Você só pode apagar suas mensagens!");

return;

}



if(confirm("Deletar mensagem?")){


lista.splice(i,1);


localStorage.plano777=JSON.stringify(lista);


carregar();


}



}





function apagar(){



if(confirm("Apagar toda conversa?")){


localStorage.removeItem("plano777");


carregar();


}


}





function baixar(){



let lista=JSON.parse(localStorage.plano777||"[]");



let arquivo="Plano777 - 777ZAP\n\n";



lista.forEach(m=>{


arquivo+=m.nome+": ";



if(m.tipo=="foto"){

arquivo+="[Foto]\n";

}else{

arquivo+=m.texto+"\n";

}



});



let blob=new Blob([arquivo],{

type:"text/plain"

});



let link=document.createElement("a");


link.href=URL.createObjectURL(blob);


link.download="Plano777.txt";


link.click();



}


</script>


</body>
</html>
